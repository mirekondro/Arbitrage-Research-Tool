<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="#0d1117"/>

  <!-- Left platform bar — Polymarket purple -->
  <rect x="72" y="240" width="96" height="220" rx="12" fill="#a371f7"/>

  <!-- Right platform bar — Kalshi green -->
  <rect x="344" y="140" width="96" height="320" rx="12" fill="#3fb950"/>

  <!-- Dashed connector line between platforms -->
  <line x1="168" y1="280" x2="344" y2="200"
        stroke="#30363d" stroke-width="6"
        stroke-dasharray="16,10" stroke-linecap="round"/>

  <!-- Upward arrow shaft -->
  <line x1="256" y1="360" x2="256" y2="130"
        stroke="#58a6ff" stroke-width="20"
        stroke-linecap="round"/>

  <!-- Upward arrow head -->
  <polyline points="196,192 256,120 316,192"
            stroke="#58a6ff" stroke-width="20"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"/>

  <!-- Small % symbol on arrow -->
  <circle cx="232" cy="290" r="14" fill="#58a6ff"/>
  <circle cx="280" cy="330" r="14" fill="#58a6ff"/>
  <line x1="222" y1="340" x2="290" y2="280"
        stroke="#58a6ff" stroke-width="10"
        stroke-linecap="round"/>
</svg>
